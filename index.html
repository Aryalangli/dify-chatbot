  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --primary: #a78bfa;
      --primary-glow: #c4b5fd;
      --text: #e2e8f0;
      --text-secondary: #a5b4fc;

    body {

      z-index: 1;

      flex-direction: column;

      align-items: center;
      justify-content: center;

    }
    .logo-wrapper svg { width: 40px; height: 40px; }

    /* 标题 */
    .hero h1 {
      font-size: 52px;
      font-weight: 800;
      background: linear-gradient(135deg, #e0e7ff 0%, #c4b5fd 40%, #f0abfc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      letter-spacing: -1px;
      text-shadow: none;
    }
    .hero .subtitle {
      font-size: 17px;
      color: rgba(203,213,225,0.7);
      max-width: 460px;
      line-height: 1.8;
      margin-bottom: 56px;

    /* 功能卡片 */
    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;

      margin-bottom: 48px;

    .feature-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 32px 20px;
      transition: all 0.4s;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .feature-card:hover {
      background: rgba(30,27,75,0.75);
      border-color: rgba(167,139,250,0.5);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(139,92,246,0.15);
    }
    .feature-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: rgba(139,92,246,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }
    .feature-icon svg { width: 24px; height: 24px; stroke: #c4b5fd; }
    .feature-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 6px; color: #e2e8f0; }
    .feature-card p { font-size: 13px; color: rgba(148,163,184,0.8); line-height: 1.6; }

    /* CTA */
    .cta {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      background: rgba(30,27,75,0.4);
      border: 1px solid rgba(139,92,246,0.25);
      border-radius: 50px;
      font-size: 15px;
      color: rgba(203,213,225,0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      animation: ctaPulse 2.5s ease-in-out infinite;
    }
    @keyframes ctaPulse {
      0%, 100% { border-color: rgba(139,92,246,0.2); box-shadow: 0 0 0 rgba(139,92,246,0); }
      50% { border-color: rgba(167,139,250,0.4); box-shadow: 0 0 20px rgba(139,92,246,0.08); }
    }
    .cta-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #a78bfa;
      box-shadow: 0 0 10px #a78bfa;
      animation: dotBlink 1.8s infinite;
    }
    @keyframes dotBlink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.7); }
    }

    /* Dify 气泡 */
    #dify-chatbot-bubble-button {
      background: linear-gradient(135deg, #818cf8, #a78bfa, #e879f9) !important;
      box-shadow: 0 4px 24px rgba(139,92,246,0.5) !important;
      width: 56px !important;
      height: 56px !important;
      transition: all 0.3s !important;
      border: none !important;

    #dify-chatbot-bubble-button:hover {

      box-shadow: 0 6px 32px rgba(167,139,250,0.6) !important;

    #dify-chatbot-bubble-window {
      width: 26rem !important;
      height: 44rem !important;
      border-radius: 16px !important;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6) !important;
      border: 1px solid rgba(139,92,246,0.2) !important;
    }

    @media (max-width: 640px) {
      .hero h1 { font-size: 34px; }
      .features { grid-template-columns: 1fr; max-width: 320px; }
      #dify-chatbot-bubble-window {
        width: 100vw !important;
        height: 100vh !important;
        border-radius: 0 !important;
      }
    }
  </style>
</head>
<body>
  <!-- 动态 Canvas 背景 -->
  <canvas id="bg-canvas"></canvas>

  <!-- 主内容 -->
  <div class="hero">
    <div class="logo-wrapper">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/>

        <circle cx="12" cy="12" r="3" fill="white" stroke="none"/>
      </svg>
    </div>

    <h1>AI 智能助手</h1>
    <p class="subtitle">
      基于 Dify 架构构建的智能对话机器人<br>随时为你解答问题、提供帮助
    </p>

    <div class="features">
      <div class="feature-card">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <h3>即时响应</h3>
        <p>秒级回复，智能理解每一个问题</p>
      </div>
      <div class="feature-card">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <h3>知识丰富</h3>
        <p>接入强大 AI 模型，覆盖广泛领域</p>
      </div>
      <div class="feature-card">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <h3>安全可靠</h3>
        <p>对话隐私有保障，数据安全不泄露</p>
      </div>
    </div>

    <div class="cta">
      <span class="cta-dot"></span>
      点击右下角按钮，开始对话
    </div>
  </div>

  <!-- Canvas 动画脚本 -->
  <script>
    (function() {
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d');
      let w, h, particles = [];
      const PARTICLE_COUNT = 80;

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      // 星云渐变背景（静态层，画一次后保持不变）
      function drawNebula() {
        // 深空底色
        ctx.fillStyle = '#0a0a1a';
        ctx.fillRect(0, 0, w, h);

        // 大块星云光晕 - 左上紫蓝
        const g1 = ctx.createRadialGradient(w*0.25, h*0.3, 0, w*0.25, h*0.3, w*0.6);
        g1.addColorStop(0, 'rgba(99,102,241,0.12)');
        g1.addColorStop(0.5, 'rgba(139,92,246,0.05)');
        g1.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g1;
        ctx.fillRect(0, 0, w, h);

        // 右下粉紫光晕
        const g2 = ctx.createRadialGradient(w*0.7, h*0.65, 0, w*0.7, h*0.65, w*0.5);
        g2.addColorStop(0, 'rgba(236,72,153,0.08)');
        g2.addColorStop(0.5, 'rgba(168,85,247,0.04)');
        g2.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g2;
        ctx.fillRect(0, 0, w, h);

        // 中间微光
        const g3 = ctx.createRadialGradient(w*0.5, h*0.45, 0, w*0.5, h*0.45, w*0.35);
        g3.addColorStop(0, 'rgba(129,140,248,0.06)');
        g3.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g3;
        ctx.fillRect(0, 0, w, h);
      }

      // 粒子类
      class Particle {
        constructor() {
          this.reset(true);
        }
        reset(init) {
          this.x = Math.random() * w;
          this.y = init ? Math.random() * h : h + 10;
          this.size = Math.random() * 2 + 0.5;
          this.speedY = Math.random() * 0.3 + 0.1;
          this.speedX = (Math.random() - 0.5) * 0.2;
          this.opacity = Math.random() * 0.6 + 0.1;
          this.opacitySpeed = Math.random() * 0.005 + 0.002;
          this.opacityPhase = Math.random() * Math.PI * 2;
          // 颜色在紫-粉-白之间
          const colors = [
            [199, 210, 254], // indigo-200
            [221, 214, 254], // violet-200
            [245, 208, 254], // fuchsia-200
            [224, 231, 255], // 偏白
          ];
          const c = colors[Math.floor(Math.random() * colors.length)];
          this.color = `rgba(${c[0]},${c[1]},${c[2]},`;
        }
        update() {
          this.y -= this.speedY;
          this.x += this.speedX + Math.sin(this.y * 0.002 + this.opacityPhase) * 0.15;
          this.currentOpacity = this.opacity * (0.5 + 0.5 * Math.sin(Date.now() * this.opacitySpeed + this.opacityPhase));
          if (this.y < -10 || this.x < -20 || this.x > w + 20) {
            this.y = h + 10;
            this.x = Math.random() * w;
          }
        }
        draw(ctx) {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = this.color + this.currentOpacity + ')';
          ctx.fill();
        }
      }

      // 光线粒子 - 更大更亮
      class LightParticle {
        constructor() {
          this.reset(true);
        }
        reset(init) {
          this.x = Math.random() * w;
          this.y = init ? Math.random() * h : h + 10;
          this.size = Math.random() * 3 + 1.5;
          this.speedY = Math.random() * 0.15 + 0.05;
          this.opacity = Math.random() * 0.3 + 0.05;
          this.opacitySpeed = Math.random() * 0.003 + 0.001;
          this.opacityPhase = Math.random() * Math.PI * 2;
        }
        update() {
          this.y -= this.speedY;
          this.x += Math.sin(this.y * 0.001 + this.opacityPhase) * 0.1;
          this.currentOpacity = this.opacity * (0.4 + 0.6 * Math.sin(Date.now() * this.opacitySpeed + this.opacityPhase));
          if (this.y < -10) { this.y = h + 10; this.x = Math.random() * w; }
        }
        draw(ctx) {
          const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2.5);
          glow.addColorStop(0, `rgba(199,210,254,${this.currentOpacity})`);
          glow.addColorStop(0.5, `rgba(167,139,250,${this.currentOpacity * 0.4})`);
          glow.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
          ctx.fillStyle = glow;
          ctx.fill();
        }
      }

      // 创建粒子
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push(new Particle());
      }
      for (let i = 0; i < 25; i++) {
        particles.push(new LightParticle());
      }

      // 画星云（只在 resize 时重画）
      drawNebula();
      window.addEventListener('resize', () => {
        resize();
        drawNebula();
      });

      // 动画循环
      function animate() {
        // 半透明覆盖制造拖尾效果，同时保持星云
        ctx.fillStyle = 'rgba(10,10,26,0.15)';
        ctx.fillRect(0, 0, w, h);

        particles.forEach(p => {
          p.update();
          p.draw(ctx);
        });

        // 偶尔重绘星云补充亮度
        if (Math.random() < 0.02) {
          drawNebula();
        }

        requestAnimationFrame(animate);
      }
      animate();
    })();
  </script>
</body>
</html>
