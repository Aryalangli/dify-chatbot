  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --primary: #a78bfa;
      --primary-glow: #c4b5fd;
      --text: #e2e8f0;
      --text-secondary: #a5b4fc;
      --card-bg: rgba(30,27,75,0.55);
      --card-border: rgba(139,92,246,0.25);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0a0a1a;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 星空底层 */
    #starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
    }
    /* Canvas 粒子层 */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* 主容器 */
    .hero {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      text-align: center;
      backdrop-filter: blur(0px);
    }

    /* Logo */
    .logo-wrapper {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #818cf8 0%, #a78bfa 40%, #e879f9 100%);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      box-shadow: 0 0 60px rgba(139,92,246,0.35), 0 8px 32px rgba(129,140,248,0.3);
      animation: logoGlow 3s ease-in-out infinite;
    }
    @keyframes logoGlow {
      0%, 100% { box-shadow: 0 0 40px rgba(139,92,246,0.3), 0 8px 24px rgba(129,140,248,0.2); }
      50% { box-shadow: 0 0 80px rgba(167,139,250,0.5), 0 8px 40px rgba(192,132,252,0.4); }
    }
    .logo-wrapper svg { width: 40px; height: 40px; }

    /* 标题 */
    .hero h1 {
      font-size: 52px;
      font-weight: 800;
      background: linear-gradient(135deg, #e0e7ff 0%, #c4b5fd 40%, #f0abfc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      letter-spacing: -1px;
      text-shadow: none;
    }
    .hero .subtitle {
      font-size: 17px;
      color: rgba(203,213,225,0.7);
      max-width: 460px;
      line-height: 1.8;
      margin-bottom: 56px;
    }

    /* 功能卡片 */
    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      max-width: 780px;
      width: 100%;
      margin-bottom: 48px;
    }
    .feature-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 32px 20px;
      transition: all 0.4s;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .feature-card:hover {
      background: rgba(30,27,75,0.75);
      border-color: rgba(167,139,250,0.5);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(139,92,246,0.15);
    }
    .feature-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: rgba(139,92,246,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }
    .feature-icon svg { width: 24px; height: 24px; stroke: #c4b5fd; }
    .feature-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 6px; color: #e2e8f0; }
    .feature-card p { font-size: 13px; color: rgba(148,163,184,0.8); line-height: 1.6; }

    /* CTA */
    .cta {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      background: rgba(30,27,75,0.4);
      border: 1px solid rgba(139,92,246,0.25);
      border-radius: 50px;
      font-size: 15px;
      color: rgba(203,213,225,0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      animation: ctaPulse 2.5s ease-in-out infinite;
    }
    @keyframes ctaPulse {
      0%, 100% { border-color: rgba(139,92,246,0.2); box-shadow: 0 0 0 rgba(139,92,246,0); }
      50% { border-color: rgba(167,139,250,0.4); box-shadow: 0 0 20px rgba(139,92,246,0.08); }
    }
    .cta-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #a78bfa;
      box-shadow: 0 0 10px #a78bfa;
      animation: dotBlink 1.8s infinite;
    }
    @keyframes dotBlink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.7); }
    }

    /* Dify 气泡 */
    #dify-chatbot-bubble-button {
      background: linear-gradient(135deg, #818cf8, #a78bfa, #e879f9) !important;
      box-shadow: 0 4px 24px rgba(139,92,246,0.5) !important;
      width: 56px !important;
      height: 56px !important;
      transition: all 0.3s !important;
      border: none !important;
    }
    #dify-chatbot-bubble-button:hover {
      transform: scale(1.08) !important;
      box-shadow: 0 6px 32px rgba(167,139,250,0.6) !important;
    }
    #dify-chatbot-bubble-window {
      width: 26rem !important;
      height: 44rem !important;
      border-radius: 16px !important;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6) !important;
      border: 1px solid rgba(139,92,246,0.2) !important;
    }

    @media (max-width: 640px) {
      .hero h1 { font-size: 34px; }
      .features { grid-template-columns: 1fr; max-width: 320px; }
      #dify-chatbot-bubble-window {
        width: 100vw !important;
        height: 100vh !important;
        border-radius: 0 !important;
      }
    }
  </style>
</head>
<body>
  <!-- 静态星空底层 -->
  <canvas id="starfield"></canvas>
  <!-- 动态粒子层 -->
  <canvas id="bg-canvas"></canvas>

  <!-- 主内容 -->
  <div class="hero">
    <div class="logo-wrapper">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M8 12a4 4 0 0 1 8 0"/>
        <circle cx="12" cy="12" r="3" fill="white" stroke="none"/>
      </svg>
    </div>

    <h1>AI 智能助手</h1>
    <p class="subtitle">
      基于 Dify 架构构建的智能对话机器人<br>随时为你解答问题、提供帮助
    </p>

    <div class="features">
      <div class="feature-card">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <h3>即时响应</h3>
        <p>秒级回复，智能理解每一个问题</p>
      </div>
      <div class="feature-card">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <h3>知识丰富</h3>
        <p>接入强大 AI 模型，覆盖广泛领域</p>
      </div>
      <div class="feature-card">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <h3>安全可靠</h3>
        <p>对话隐私有保障，数据安全不泄露</p>
      </div>
    </div>

    <div class="cta">
      <span class="cta-dot"></span>
      点击右下角按钮，开始对话
    </div>
  </div>

  <!-- 星空 + 粒子脚本 -->
  <script>
    (function() {
      // ====== 底层：静态星空 ======
      const sf = document.getElementById('starfield');
      const sfCtx = sf.getContext('2d');
      let stars = [];

      function drawStarfield() {
        const w = sf.width = window.innerWidth;
        const h = sf.height = window.innerHeight;

        // 深邃黑底
        sfCtx.fillStyle = '#050510';
        sfCtx.fillRect(0, 0, w, h);

        // 生成星星（只在首次和 resize 时）
        stars = [];
        const count = Math.floor(w * h / 800); // 密度适中
        for (let i = 0; i < count; i++) {
          const size = Math.random() * 2.2 + 0.3;
          const brightness = Math.random();
          // 大多白/蓝白，少量暖黄
          const r = 180 + Math.floor(Math.random() * 75);
          const g = 180 + Math.floor(Math.random() * 75);
          const b = 200 + Math.floor(Math.random() * 55);
          stars.push({
            x: Math.random() * w,
            y: Math.random() * h,
            r: size,
            opacity: 0.25 + brightness * 0.75,
            color: `rgba(${r},${g},${b},`
          });
        }

        // 画星星
        stars.forEach(s => {
          // 亮星加光晕
          if (s.r > 1.6 && s.opacity > 0.7) {
            const glow = sfCtx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 4);
            glow.addColorStop(0, `rgba(200,210,255,${s.opacity * 0.5})`);
            glow.addColorStop(1, 'rgba(0,0,0,0)');
            sfCtx.beginPath();
            sfCtx.arc(s.x, s.y, s.r * 4, 0, Math.PI * 2);
            sfCtx.fillStyle = glow;
            sfCtx.fill();
          }
          sfCtx.beginPath();
          sfCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          sfCtx.fillStyle = s.color + s.opacity + ')';
          sfCtx.fill();
        });
      }

      drawStarfield();
      window.addEventListener('resize', drawStarfield);

      // ====== 上层：动态粒子（透明底） ======
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d');
      let w, h, particles = [];

      function resizeParticles() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      resizeParticles();
      window.addEventListener('resize', resizeParticles);

      class Particle {
        constructor() {
          this.reset(true);
        }
        reset(init) {
          this.x = Math.random() * w;
          this.y = init ? Math.random() * h : h + 10;
          this.size = Math.random() * 2 + 0.5;
          this.speedY = Math.random() * 0.3 + 0.1;
          this.speedX = (Math.random() - 0.5) * 0.2;
          this.opacity = Math.random() * 0.5 + 0.1;
          this.opacitySpeed = Math.random() * 0.005 + 0.002;
          this.opacityPhase = Math.random() * Math.PI * 2;
          const colors = [
            [199, 210, 254],
            [221, 214, 254],
            [245, 208, 254],
            [224, 231, 255],
          ];
          const c = colors[Math.floor(Math.random() * colors.length)];
          this.color = `rgba(${c[0]},${c[1]},${c[2]},`;
        }
        update() {
          this.y -= this.speedY;
          this.x += this.speedX + Math.sin(this.y * 0.002 + this.opacityPhase) * 0.15;
          this.currentOpacity = this.opacity * (0.5 + 0.5 * Math.sin(Date.now() * this.opacitySpeed + this.opacityPhase));
          if (this.y < -10 || this.x < -20 || this.x > w + 20) {
            this.y = h + 10;
            this.x = Math.random() * w;
          }
        }
        draw(ctx) {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = this.color + this.currentOpacity + ')';
          ctx.fill();
        }
      }

      class LightParticle {
        constructor() {
          this.reset(true);
        }
        reset(init) {
          this.x = Math.random() * w;
          this.y = init ? Math.random() * h : h + 10;
          this.size = Math.random() * 3 + 1.5;
          this.speedY = Math.random() * 0.15 + 0.05;
          this.opacity = Math.random() * 0.25 + 0.04;
          this.opacitySpeed = Math.random() * 0.003 + 0.001;
          this.opacityPhase = Math.random() * Math.PI * 2;
        }
        update() {
          this.y -= this.speedY;
          this.x += Math.sin(this.y * 0.001 + this.opacityPhase) * 0.1;
          this.currentOpacity = this.opacity * (0.4 + 0.6 * Math.sin(Date.now() * this.opacitySpeed + this.opacityPhase));
          if (this.y < -10) { this.y = h + 10; this.x = Math.random() * w; }
        }
        draw(ctx) {
          const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2.5);
          glow.addColorStop(0, `rgba(199,210,254,${this.currentOpacity})`);
          glow.addColorStop(0.5, `rgba(167,139,250,${this.currentOpacity * 0.4})`);
          glow.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
          ctx.fillStyle = glow;
          ctx.fill();
        }
      }

      for (let i = 0; i < 80; i++) particles.push(new Particle());
      for (let i = 0; i < 25; i++) particles.push(new LightParticle());

      function animate() {
        // 透明层，只清粒子
        ctx.clearRect(0, 0, w, h);
        particles.forEach(p => {
          p.update();
          p.draw(ctx);
        });
        requestAnimationFrame(animate);
      }
      animate();
    })();
  </script>
</body>
</html>
