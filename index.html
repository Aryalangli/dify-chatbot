<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 智能助手</title>

  <!-- Dify Chatbot -->
  <script>
    window.difyChatbotConfig = {
      token: 'YfBHRqRQXqPpseQj',
      inputs: {},
      systemVariables: {},
      userVariables: {},
    }
  </script>
  <script src="https://udify.app/embed.min.js" id="YfBHRqRQXqPpseQj" defer></script>

  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --card-hover: #222240;
      --text: #e2e8f0;
      --text-secondary: #94a3b8;
      --border: #2d2d50;
      --gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
      --glow: 0 0 40px rgba(99,102,241,0.15);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 背景动画粒子 */
    .bg-particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: var(--primary);
      opacity: 0;
      animation: floatUp 8s infinite;
    }
    @keyframes floatUp {
      0%   { opacity:0; transform: translateY(100vh) scale(0); }
      10%  { opacity:0.15; }
      90%  { opacity:0; }
      100% { opacity:0; transform: translateY(-10vh) scale(1.5); }
    }

    /* 主容器 */
    .hero {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      text-align: center;
    }

    /* Logo */
    .logo-wrapper {
      width: 80px;
      height: 80px;
      background: var(--gradient);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      box-shadow: 0 8px 32px rgba(99,102,241,0.4);
      animation: logoPulse 3s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 8px 32px rgba(99,102,241,0.4); }
      50% { box-shadow: 0 8px 48px rgba(139,92,246,0.6); }
    }
    .logo-wrapper svg { width: 40px; height: 40px; }

    /* 标题 */
    .hero h1 {
      font-size: 48px;
      font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      letter-spacing: -1px;
    }
    .hero .subtitle {
      font-size: 18px;
      color: var(--text-secondary);
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 48px;
    }

    /* 功能卡片 */
    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      max-width: 780px;
      width: 100%;
      margin-bottom: 48px;
    }
    .feature-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 20px;
      transition: all 0.3s;
    }
    .feature-card:hover {
      background: var(--card-hover);
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: var(--glow);
    }
    .feature-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(99,102,241,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }
    .feature-icon svg { width: 22px; height: 22px; stroke: #a5b4fc; }
    .feature-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .feature-card p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

    /* CTA */
    .cta {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 50px;
      font-size: 15px;
      color: var(--text-secondary);
      animation: gentlePulse 2s ease-in-out infinite;
    }
    @keyframes gentlePulse {
      0%, 100% { border-color: var(--border); }
      50% { border-color: var(--primary); }
    }
    .cta-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
      animation: dotBlink 1.5s infinite;
    }
    @keyframes dotBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Dify 气泡样式覆盖 */
    #dify-chatbot-bubble-button {
      background: var(--gradient) !important;
      box-shadow: 0 4px 20px rgba(99,102,241,0.5) !important;
      width: 56px !important;
      height: 56px !important;
      transition: transform 0.3s !important;
    }
    #dify-chatbot-bubble-button:hover {
      transform: scale(1.08) !important;
    }
    #dify-chatbot-bubble-window {
      width: 26rem !important;
      height: 44rem !important;
      border-radius: 16px !important;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5) !important;
    }

    @media (max-width: 640px) {
      .hero h1 { font-size: 32px; }
      .features { grid-template-columns: 1fr; max-width: 340px; }
      #dify-chatbot-bubble-window {
        width: 100vw !important;
        height: 100vh !important;
        border-radius: 0 !important;
      }
    }
  </style>
</head>
<body>
  <!-- 背景粒子 -->
  <div class="bg-particles" id="particles"></div>

  <!-- 主内容 -->
  <div class="hero">
    <div class="logo-wrapper">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        <line x1="9" y1="10" x2="15" y2="10"/>
        <line x1="9" y1="14" x2="13" y2="14"/>
      </svg>
    </div>

    <h1>AI 智能助手</h1>
    <p class="subtitle">
      基于 Dify 架构构建的智能对话机器人，随时为你解答问题、提供帮助。
    </p>

    <div class="features">
      <div class="feature-card">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
          </svg>
        </div>
        <h3>即时响应</h3>
        <p>秒级回复，智能理解你的每一个问题</p>
      </div>
      <div class="feature-card">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <h3>知识丰富</h3>
        <p>接入强大 AI 模型，覆盖广泛领域</p>
      </div>
      <div class="feature-card">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <h3>安全可靠</h3>
        <p>你的对话隐私有保障，数据安全不泄露</p>
      </div>
    </div>

    <div class="cta">
      <span class="cta-dot"></span>
      点击右下角按钮，开始对话
    </div>
  </div>

  <!-- 背景粒子生成 -->
  <script>
    (function() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 4 + 2;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 8 + 's';
        p.style.animationDuration = (Math.random() * 6 + 6) + 's';
        container.appendChild(p);
      }
    })();
  </script>
</body>
</html>
